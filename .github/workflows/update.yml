name: Update paper radar data

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update RSS data
        env:
          MAX_ITEMS_PER_FEED: "80"
          ENABLE_TRANSLATION: "false"
        run: python scripts/update_feeds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/articles.json data/trends.json
          git diff --cached --quiet || git commit -m "Update paper radar data"
          git push
